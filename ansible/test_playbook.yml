---
# Manual test playbook for jtcom_config.
#
# Required variables:
#   - jtcom_host
#   - jtcom_user
#   - jtcom_pass
#
# Dry-run:
#   cd ansible && OBJC_DISABLE_INITIALIZE_FORK_SAFETY=YES VIRTUAL_ENV=../.venv \
#     ANSIBLE_CONFIG=ansible.cfg ../.venv/bin/ansible-playbook -i inventory.ini \
#     test_playbook.yml -e jtcom_host=192.0.2.1 -e jtcom_user=admin \
#     -e jtcom_pass=admin --check
#
# Live apply:
#   same command without --check

- hosts: local
  connection: local
  gather_facts: false
  vars:
    # Use the project venv so napalm-jtcom is importable by the module.
    ansible_python_interpreter: "{{ lookup('env', 'VIRTUAL_ENV') }}/bin/python3"

  tasks:
    - name: Safe default example - add VLAN 61 tagged on ports 1..5
      jtcom_config:
        host: "{{ jtcom_host }}"
        username: "{{ jtcom_user }}"
        password: "{{ jtcom_pass }}"
        backup_before_change: true
        vlans:
          61:
            name: Admin_VLAN
            tagged_add: [1, 2, 3, 4, 5]
      register: result

    - name: Show result
      ansible.builtin.debug:
        var: result

    # Access port example:
    # - name: Configure port 3 as access VLAN 20
    #   jtcom_config:
    #     host: "{{ jtcom_host }}"
    #     username: "{{ jtcom_user }}"
    #     password: "{{ jtcom_pass }}"
    #     ports:
    #       3:
    #         access_vlan: 20

    # Trunk example:
    # - name: Configure port 5 as trunk with native VLAN 10
    #   jtcom_config:
    #     host: "{{ jtcom_host }}"
    #     username: "{{ jtcom_user }}"
    #     password: "{{ jtcom_pass }}"
    #     allow_port_mode_change: true
    #     ports:
    #       5:
    #         native_vlan: 10
    #         trunk_set_vlans: [20, 30]

    # Explicit untagged move override:
    # - name: Move port 3 from VLAN 20 to VLAN 30
    #   jtcom_config:
    #     host: "{{ jtcom_host }}"
    #     username: "{{ jtcom_user }}"
    #     password: "{{ jtcom_pass }}"
    #     allow_untagged_move: true
    #     ports:
    #       3:
    #         access_vlan: 30

    # VLAN delete-in-use override:
    # - name: Delete VLAN 61 after detaching it from ports
    #   jtcom_config:
    #     host: "{{ jtcom_host }}"
    #     username: "{{ jtcom_user }}"
    #     password: "{{ jtcom_pass }}"
    #     allow_vlan_delete_in_use: true
    #     vlans:
    #       61:
    #         state: absent

    # Check mode hint:
    # Run this playbook with --check to inspect structured warnings and planned
    # canonical VLAN membership changes without writing to the switch.
